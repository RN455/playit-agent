name: Build macOS playit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: List release files
        run: ls -lah target/release

      - name: Prepare artifact
        run: |
          if [ -f target/release/playit-cli ]; then
            cp target/release/playit-cli playit-macos-intel
          elif [ -f target/release/playit-agent ]; then
            cp target/release/playit-agent playit-macos-intel
          elif [ -f target/release/playit ]; then
            cp target/release/playit playit-macos-intel
          else
            echo "Could not find playit binary. Files:"
            ls -lah target/release
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playit-macos-intel
          path: playit-macos-intel
