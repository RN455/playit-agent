name: Build macOS Intel playit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build Intel release
        run: cargo build --release --target x86_64-apple-darwin

      - name: List release files
        run: ls -lah target/x86_64-apple-darwin/release

      - name: Prepare artifact
        run: |
          if [ -f target/x86_64-apple-darwin/release/playit-cli ]; then
            cp target/x86_64-apple-darwin/release/playit-cli playit-macos-intel
          elif [ -f target/x86_64-apple-darwin/release/playit-agent ]; then
            cp target/x86_64-apple-darwin/release/playit-agent playit-macos-intel
          elif [ -f target/x86_64-apple-darwin/release/playit ]; then
            cp target/x86_64-apple-darwin/release/playit playit-macos-intel
          else
            echo "Could not find playit binary"
            ls -lah target/x86_64-apple-darwin/release
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playit-macos-intel
          path: playit-macos-intel
