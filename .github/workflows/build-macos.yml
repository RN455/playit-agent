name: Build macOS Intel playit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build Intel release
        run: cargo build --release --target x86_64-apple-darwin

      - name: List release files
        run: ls -lah target/x86_64-apple-darwin/release

      - name: Prepare artifacts
        run: |
          mkdir playit-macos-intel-files
          cp target/x86_64-apple-darwin/release/playit-cli playit-macos-intel-files/playit
          cp target/x86_64-apple-darwin/release/playitd playit-macos-intel-files/playitd
          chmod +x playit-macos-intel-files/playit
          chmod +x playit-macos-intel-files/playitd
          ls -lah playit-macos-intel-files

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playit-macos-intel-files
          path: playit-macos-intel-files
